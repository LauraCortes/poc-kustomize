apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-controller
  namespace: platform-system 
  labels:
    app: platform-controller
    version: 1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: platform-controller
  template:
    metadata:
      labels:
        app: platform-controller
    spec:
      containers:
        - name: controller
          image: nginx:1.26
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: platform-config