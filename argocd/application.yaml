apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: poc-platform-primary
  namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/LauraCortes/poc-kustomize.git
        targetRevision: main
        path: overlays/us-east-1
    destination:
        namespace: platform-system
        server: https://kubernetes.default.svc
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
            - ApplyOutOfSyncOnly= true